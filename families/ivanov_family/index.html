<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="../../style.css">
    <style>
        .tab { display: inline-block; padding: 10px; cursor: pointer; background: #eee; }
        .active-tab { background: #007bff; color: white; }
        .tab-content { display: none; padding: 20px; border: 1px solid #ccc; }
        .active-content { display: block; }
    </style>
</head>
<body>
    <h1>👨‍👩‍👧 Семья Ивановых</h1>
    <div>
        <div class="tab active-tab" data-tab="father">Отец</div>
        <div class="tab" data-tab="mother">Мать</div>
        <div class="tab" data-tab="child">Ребенок</div>
    </div>

    <div id="father" class="tab-content active-content">
        <h3>Анализы отца</h3>
        <p>Гемоглобин: 145</p>
        <p>Лейкоциты: 6.2</p>
        <p>📈 Исцеление: 85%</p>
    </div>
    <div id="mother" class="tab-content">
        <h3>Анализы матери</h3>
        <p>Гемоглобин: 132</p>
        <p>Лейкоциты: 7.1</p>
        <p>📈 Исцеление: 92%</p>
    </div>
    <div id="child" class="tab-content">
        <h3>Анализы ребенка</h3>
        <p>Гемоглобин: 128</p>
        <p>Лейкоциты: 5.8</p>
        <p>📈 Исцеление: 78%</p>
    </div>

    <script>
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active-tab'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-content'));
                tab.classList.add('active-tab');
                document.getElementById(tab.dataset.tab).classList.add('active-content');
            };
        });
    </script>
</body>
</html>
