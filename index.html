<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>База пациентов — Рукья</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh}
  a{color:inherit;text-decoration:none}

  /* TOP BAR */
  .topbar{background:#fff;border-bottom:1px solid #e8e6e0;padding:0 20px;display:flex;align-items:center;gap:16px;height:52px;position:sticky;top:0;z-index:100}
  .topbar-title{font-size:16px;font-weight:600;color:#26215C;flex:1}
  .topbar-title span{font-weight:400;color:#888}

  /* CONTROLS */
  .controls{padding:16px 20px 8px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .search-wrap{flex:1;min-width:160px;max-width:280px;position:relative}
  .search-wrap input{width:100%;height:34px;border:1px solid #ddd;border-radius:8px;padding:0 10px 0 32px;font-size:13px;background:#fff;outline:none}
  .search-wrap input:focus{border-color:#7F77DD}
  .search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:14px;height:14px;opacity:.4}
  .fbtns{display:flex;gap:5px;flex-wrap:wrap}
  .fb{height:32px;padding:0 12px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:12px;cursor:pointer;color:#555;transition:all .15s}
  .fb:hover{border-color:#7F77DD;color:#534AB7}
  .fb.on{background:#EEEDFE;border-color:#AFA9EC;color:#3C3489;font-weight:500}

  /* STATS */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:0 20px 16px}
  .stat{background:#fff;border:1px solid #e8e6e0;border-radius:10px;padding:12px 14px;text-align:center}
  .stat-n{font-size:22px;font-weight:600}
  .stat-l{font-size:11px;color:#888;margin-top:2px}
  .stat-n.purple{color:#534AB7}
  .stat-n.green{color:#1D9E75}

  /* MAIN LAYOUT */
  .main{padding:0 20px 40px;display:flex;flex-direction:column;gap:12px}

  /* GROUP */
  .group{background:#fff;border:1px solid #e8e6e0;border-radius:12px;overflow:hidden}
  .group-head{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;border-bottom:1px solid #e8e6e0}
  .group-head:hover{background:#fafaf8}
  .group-name{font-size:14px;font-weight:600}
  .group-city{font-size:12px;color:#888;margin-top:1px}
  .group-right{display:flex;align-items:center;gap:8px}
  .group-avg{font-size:13px;font-weight:600;color:#534AB7}
  .g-badge{font-size:11px;padding:2px 10px;border-radius:20px;background:#E6F1FB;color:#0C447C}
  .chevron{font-size:11px;color:#aaa;transition:transform .2s}
  .chevron.open{transform:rotate(90deg)}

  /* PATIENT ROW */
  .p-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid #f0eeea;cursor:pointer;transition:background .1s;text-decoration:none;color:inherit}
  .p-row:last-child{border:none}
  .p-row:hover{background:#fafaf8}
  .p-av{width:34px;height:34px;border-radius:50%;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .p-info{flex:1;min-width:0}
  .p-name{font-size:13px;font-weight:500}
  .p-sub{font-size:11px;color:#888;margin-top:1px}
  .p-type{font-size:11px;padding:2px 8px;border-radius:12px;white-space:nowrap;flex-shrink:0}
  .p-prog-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
  .p-bar{width:56px;height:5px;background:#eee;border-radius:3px;overflow:hidden}
  .p-fill{height:100%;border-radius:3px}
  .p-pct{font-size:12px;font-weight:600;min-width:32px;text-align:right}

  /* EMPTY */
  .empty{text-align:center;padding:3rem 1rem;color:#aaa;font-size:14px}

  /* MOBILE */
  @media(max-width:520px){
    .stats{grid-template-columns:repeat(2,1fr)}
    .p-prog-wrap{display:none}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">База пациентов <span>· Рукья</span></div>
</div>

<div class="controls">
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 16 16" fill="none" stroke="#333" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5L14 14"/></svg>
    <input type="text" id="srch" placeholder="Поиск по имени...">
  </div>
  <div class="fbtns" id="filters">
    <button class="fb on" data-f="all">Все</button>
    <button class="fb" data-f="сихр">Сихр</button>
    <button class="fb" data-f="джинн">Джинн</button>
    <button class="fb" data-f="сглаз">Сглаз</button>
    <button class="fb" data-f="зависть">Зависть</button>
    <button class="fb" data-f="active">Активные</button>
    <button class="fb" data-f="done">Завершённые</button>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-n" id="s-total">—</div><div class="stat-l">пациентов</div></div>
  <div class="stat"><div class="stat-n" id="s-groups">—</div><div class="stat-l">групп</div></div>
  <div class="stat"><div class="stat-n green" id="s-done">—</div><div class="stat-l">завершено</div></div>
  <div class="stat"><div class="stat-n purple" id="s-avg">—</div><div class="stat-l">средний %</div></div>
</div>

<div class="main" id="main"></div>

<script src="patients.js"></script>
<script>
const TYPE_COLORS = {
  сихр:    {bg:"#FAECE7",txt:"#712B13"},
  джинн:   {bg:"#EEEDFE",txt:"#3C3489"},
  сглаз:   {bg:"#FAEEDA",txt:"#633806"},
  зависть: {bg:"#FBEAF0",txt:"#72243E"},
};
function progColor(p){ return p>=80?"#1D9E75":p>=50?"#7F77DD":"#D85A30"; }
function initials(name){ return name.trim().split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase(); }

let filter="all", query="";
const collapsed = {};

document.getElementById("srch").addEventListener("input",e=>{query=e.target.value.toLowerCase();render();});
document.getElementById("filters").addEventListener("click",e=>{
  const btn=e.target.closest(".fb"); if(!btn)return;
  filter=btn.dataset.f;
  document.querySelectorAll(".fb").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  render();
});

function matchPatient(p){
  if(query && !p.name.toLowerCase().includes(query)) return false;
  if(filter==="active") return p.status==="active";
  if(filter==="done")   return p.status==="done";
  if(filter==="all")    return true;
  return p.type===filter;
}

function render(){
  const groups = (window.PATIENTS||[]).map(g=>({
    ...g,
    patients:(g.patients||[]).filter(matchPatient)
  })).filter(g=>g.patients.length>0);

  const all = groups.flatMap(g=>g.patients);
  document.getElementById("s-total").textContent  = all.length;
  document.getElementById("s-groups").textContent = groups.length;
  document.getElementById("s-done").textContent   = all.filter(p=>p.status==="done").length;
  document.getElementById("s-avg").textContent    = all.length
    ? Math.round(all.reduce((a,p)=>a+p.progress,0)/all.length)+"%"
    : "—";

  const main = document.getElementById("main");
  if(!groups.length){
    main.innerHTML='<div class="empty">Пациентов не найдено</div>';
    return;
  }

  main.innerHTML = groups.map(g=>{
    const avgG = Math.round(g.patients.reduce((a,p)=>a+p.progress,0)/g.patients.length);
    const isOpen = !collapsed[g.id];
    const rows = isOpen ? g.patients.map(p=>{
      const tc = TYPE_COLORS[p.type]||{bg:"#F1EFE8",txt:"#444"};
      const pc = progColor(p.progress);
      const av = p.avatar_color||"#EEEDFE";
      const at = p.avatar_text_color||"#534AB7";
      const ini = p.initials || initials(p.name);
      const href = p.file ? p.file : "#";
      return `<a class="p-row" href="${href}" ${href!="#"?'target="_blank"':''}>
        <div class="p-av" style="background:${av};color:${at}">${ini}</div>
        <div class="p-info">
          <div class="p-name">${p.name}</div>
          <div class="p-sub">${p.age||""} ${p.age?"лет · ":""}${p.city||""}</div>
        </div>
        <span class="p-type" style="background:${tc.bg};color:${tc.txt}">${p.type}</span>
        <div class="p-prog-wrap">
          <div class="p-bar"><div class="p-fill" style="width:${p.progress}%;background:${pc}"></div></div>
          <span class="p-pct" style="color:${pc}">${p.progress}%</span>
        </div>
      </a>`;
    }).join("") : "";

    return `<div class="group">
      <div class="group-head" onclick="toggle('${g.id}')">
        <div>
          <div class="group-name">${g.name}</div>
          <div class="group-city">${g.city||""}</div>
        </div>
        <div class="group-right">
          <span class="group-avg">${avgG}%</span>
          <span class="g-badge">${g.patients.length} чел.</span>
          <span class="chevron${isOpen?" open":""}">▶</span>
        </div>
      </div>
      ${rows}
    </div>`;
  }).join("");
}

function toggle(id){
  collapsed[id] = !collapsed[id];
  render();
}

if(!window.PATIENTS){
  document.getElementById("main").innerHTML=
    '<div class="empty">Файл patients.js не найден.<br>Убедитесь что он лежит в той же папке.</div>';
} else {
  render();
}
</script>
</body>
</html>
