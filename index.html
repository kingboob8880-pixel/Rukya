<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>База пациентов</title>
</head>
<body>
    <h1>📋 Мои пациенты</h1>
    <input type="text" id="search" placeholder="Поиск по имени или группе">
    <div id="patient-list"></div>

    <script>
        // Это ваша БД — один файл, где хранятся все данные
        const patients = [
            { name: "Иван Иванов", group: "Семья Ивановых", path: "families/ivanov_family/father.html", recovery: 85 },
            { name: "Мария Иванова", group: "Семья Ивановых", path: "families/ivanov_family/mother.html", recovery: 92 },
            { name: "Петр Петров", group: "Семья Петровых", path: "families/petrov_family/father.html", recovery: 45 },
            { name: "Сидоров", group: "Одиночные", path: "families/single_patients/sidorov.html", recovery: 100 }
        ];

        function render(filter = "") {
            const container = document.getElementById("patient-list");
            container.innerHTML = "";
            patients.filter(p => p.name.includes(filter) || p.group.includes(filter))
                .forEach(p => {
                    const card = document.createElement("div");
                    card.className = "patient-card";
                    card.innerHTML = `
                        <h3>${p.name}</h3>
                        <p>Группа: ${p.group}</p>
                        <p>📊 Исцеление: ${p.recovery}%</p>
                        <progress value="${p.recovery}" max="100"></progress>
                        <br><a href="${p.path}" target="_blank">🔬 Открыть анализы</a>
                    `;
                    container.appendChild(card);
                });
        }
        render();
        document.getElementById("search").oninput = (e) => render(e.target.value);
    </script>
</body>
</html>
